<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OKX Hotkey 설정</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">⚡ OKX Hotkey</div>
      <div class="header__status" id="status-badge">
        <span class="status-dot"></span>
        <span class="status-text">연결 확인 중...</span>
      </div>
    </header>

    <!-- Page info bar -->
    <div class="page-info" id="page-info" style="display:none">
      <span id="page-type-label"></span>
      <span id="trading-mode-label"></span>
    </div>

    <!-- Slot list -->
    <section class="section">
      <div class="section__title">단축키 슬롯</div>
      <div class="slots" id="slots-container">
        <!-- Populated by popup.js -->
      </div>
    </section>

    <!-- General settings -->
    <section class="section">
      <div class="section__title">일반 설정</div>
      <div class="general-settings">

        <div class="setting-row">
          <label class="setting-label" for="overlay-duration">알림 표시 시간 (ms)</label>
          <input
            type="number"
            id="overlay-duration"
            class="input input--small"
            min="500"
            max="10000"
            step="100"
            placeholder="2000"
          />
        </div>

        <div class="setting-row">
          <label class="setting-label" for="seed-cap">최대 운용 시드 (USD)</label>
          <input
            type="number"
            id="seed-cap"
            class="input input--small"
            min="0"
            step="1"
            placeholder="0 = 전체 잔액 사용"
          />
        </div>

        <div class="setting-row">
          <label class="setting-label" for="confirm-dangerous">위험 동작 재확인</label>
          <label class="toggle">
            <input type="checkbox" id="confirm-dangerous" />
            <span class="toggle__track"></span>
          </label>
        </div>

        <div class="setting-row">
          <label class="setting-label" for="sound-enabled">소리 활성화</label>
          <label class="toggle">
            <input type="checkbox" id="sound-enabled" />
            <span class="toggle__track"></span>
          </label>
        </div>

      </div>
    </section>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn btn--secondary" id="btn-reset">초기화</button>
      <button class="btn btn--primary" id="btn-save">저장</button>
    </div>

    <!-- Feedback message -->
    <div class="feedback" id="feedback" style="display:none"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
